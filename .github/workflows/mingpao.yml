name: Mingpao Jobs Daily

on:
  schedule:
    # 02:17 UTC = 10:17 HKT (UTC+8).
    # Deliberately off the top of the hour: GitHub delays/skips scheduled runs
    # most often at minute 0 during peak load, so a non-zero minute is more
    # reliable. Scheduled runs may still be delayed by 5-20 min.
    - cron: '17 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Mingpao scraper
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: python mingpao_jobs.py

      - name: Commit updated state files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mingpao_sent_jobs.json school_district_cache.json || true
          git diff --staged --quiet || git commit -m "Update job state [skip ci]"
          git push || true
