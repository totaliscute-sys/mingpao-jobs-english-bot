name: Mingpao Jobs Daily

on:
  schedule:
    # GitHub frequently delays or DROPS scheduled runs, so we fire 3 times in the
    # morning as redundancy. A daily guard (last_run.json) ensures only the first
    # successful run each HKT day actually sends a Telegram message.
    # Off the top of the hour on purpose (minute 0 is the least reliable).
    - cron: '17 2 * * *'   # 10:17 HKT
    - cron: '17 3 * * *'   # 11:17 HKT
    - cron: '17 4 * * *'   # 12:17 HKT
  workflow_dispatch:
    inputs:
      force:
        description: 'Send even if a message was already sent today'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # jump.mingpao.com geo-blocks non-Hong Kong IPs, and GitHub runners are in
      # the US. Tunnel through Surfshark's Hong Kong WireGuard server so the
      # scraper egresses from an HK IP. Only the client PrivateKey is secret.
      - name: Connect Hong Kong VPN (Surfshark WireGuard)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq wireguard-tools
          sudo mkdir -p /etc/wireguard
          sudo bash -c 'umask 077; cat > /etc/wireguard/wg0.conf' <<EOF
          [Interface]
          PrivateKey = ${{ secrets.WG_PRIVATE_KEY }}
          Address = 10.14.0.2/16
          [Peer]
          PublicKey = JYHdktdtuM7inbtsxRKSDpnBVTWQ5+QLZ/cWWmf4VRg=
          AllowedIPs = 0.0.0.0/0
          Endpoint = hk-hkg.prod.surfshark.com:51820
          PersistentKeepalive = 25
          EOF
          sudo wg-quick up wg0
          echo "VPN egress IP: $(curl -s --max-time 20 https://api.ipify.org || echo unknown)"

      - name: Run Mingpao scraper
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          FORCE_SEND: ${{ github.event.inputs.force }}
        run: python mingpao_jobs.py

      - name: Disconnect VPN
        if: always()
        run: sudo wg-quick down wg0 || true

      - name: Commit updated state files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mingpao_sent_jobs.json school_district_cache.json last_run.json || true
          git diff --staged --quiet || git commit -m "Update job state [skip ci]"
          git push || true
